<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"
  />


  <title>Nova IA</title>
  
  <!-- Font Awesome para ícones modernos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* Efeito Liquid Glass */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
                  radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
      animation: liquidMove 20s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes liquidMove {
      0% { transform: rotate(0deg) scale(1); }
      100% { transform: rotate(5deg) scale(1.1); }
    }

    /* Container principal - mobile first */
    .phone {
      width: 100%;
      max-width: 100%;
      padding: 12px;
      position: relative;
      z-index: 1;
      margin: 0 auto;
    }

    /* Card principal - otimizado para mobile */
    .screen {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      padding: 20px 18px 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
      min-height: auto;
    }

    .screen::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
      animation: shine 8s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      20% { left: 100%; }
      100% { left: 100%; }
    }

    /* Header mobile */
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
    }

    .logo-img {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .logo-img img {
      height: 46px;
      width: auto;
      display: block;
    }

    .logo-img span {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Pill de saldo - touch friendly */
    .balance-pill {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      color: #fbbf24;
      font-weight: 700;
      font-size: 13px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .separator {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin: 12px 0 18px;
    }

    /* Progresso mobile */
    .progress-line-wrap {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
    }

    .progress-reward {
      color: #fbbf24;
      font-weight: 700;
      font-size: 11px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Card de pergunta - mobile optimized */
    .question-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      animation: fadeSlideUp 0.4s ease-out;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .question-tag {
      color: #fbbf24;
      font-size: 10px;
      letter-spacing: 1px;
      font-weight: 700;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .question-text {
      font-size: 17px;
      line-height: 1.4;
      font-weight: 700;
      color: white;
    }

    /* Opções - botões grandes para mobile */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      text-align: left;
      min-height: 56px;
    }

    .option:active {
      transform: scale(0.98);
    }

    .option .option-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    /* Reward note */
    .reward-note {
      margin-top: 20px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 12px;
      color: #4ade80;
      font-weight: 600;
      text-align: center;
      padding: 12px;
      animation: pulseSoft 2s infinite;
    }

    @keyframes pulseSoft {
      0%, 100% { opacity: 1; border-color: rgba(34, 197, 94, 0.3); }
      50% { opacity: 0.85; border-color: rgba(34, 197, 94, 0.6); }
    }

    /* Landing page mobile */
    .hero-title {
      font-size: 24px;
      line-height: 1.3;
      font-weight: 800;
      color: #4ade80;
      margin: 16px 0 14px;
      text-align: center;
      animation: fadeInUp 0.5s ease-out;
    }

    .intro-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 18px;
      animation: fadeInUp 0.5s ease-out 0.1s both;
    }

    .intro-pill {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 800;
      padding: 5px 14px;
      text-align: center;
    }

    .lead-text {
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      line-height: 1.5;
      margin: 8px 0 0;
    }

    .lead-text strong {
      color: white;
    }

    /* Botões principais - touch friendly */
    .cta-big {
      display: block;
      width: 100%;
      border: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 15px;
      font-weight: 800;
      border-radius: 50px;
      padding: 16px 20px;
      margin-top: 24px;
      box-shadow: 0 15px 30px -12px rgba(34, 197, 94, 0.3);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      animation: fadeInUp 0.5s ease-out 0.3s both;
      min-height: 56px;
    }

    .cta-big:active {
      transform: scale(0.97);
    }

    .footer {
      text-align: center;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.5;
      margin-top: 24px;
    }

    .footer a {
      color: rgba(255, 255, 255, 0.4);
    }

    /* Modal mobile */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      width: 100%;
      max-width: 280px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      padding: 24px 20px;
      text-align: center;
      animation: modalPop 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    @keyframes modalPop {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-sub {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
    }

    .modal-value {
      font-size: 42px;
      color: #4ade80;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
    }

    .modal-small {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 18px;
    }

    .modal-balance {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 12px;
      margin-bottom: 18px;
    }

    .modal-balance .label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      margin-bottom: 5px;
    }

    .modal-balance .value {
      color: #fbbf24;
      font-size: 24px;
      font-weight: 800;
    }

    .btn-orange {
      width: 100%;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 50px;
    }

    .btn-orange:active {
      transform: scale(0.97);
    }

    /* Processing mobile */
    .process-wrap {
      text-align: center;
      padding-top: 10px;
      animation: fadeInUp 0.4s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .process-circle {
      width: 90px;
      height: 90px;
      margin: 10px auto 18px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fbbf24;
      position: relative;
      animation: spin 1s linear infinite;
    }

    .process-circle .inner {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      animation: spin-reverse 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes spin-reverse {
      to { transform: rotate(-360deg); }
    }

    .process-title {
      font-size: 22px;
      color: #fbbf24;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .process-sub {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      margin-bottom: 24px;
    }

    .status-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .status-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.5);
      transition: all 0.3s ease;
      animation: slideInRight 0.4s ease-out both;
    }

    .status-item:nth-child(1) { animation-delay: 0.1s; }
    .status-item:nth-child(2) { animation-delay: 0.2s; }
    .status-item:nth-child(3) { animation-delay: 0.3s; }
    .status-item:nth-child(4) { animation-delay: 0.4s; }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(-15px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .status-item.active-green {
      border-color: rgba(34, 197, 94, 0.5);
      background: rgba(34, 197, 94, 0.1);
      color: #4ade80;
    }

    .status-item.active-orange {
      border-color: rgba(245, 158, 11, 0.5);
      background: rgba(245, 158, 11, 0.1);
      color: #fbbf24;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
    }

    .status-right {
      font-size: 16px;
    }

    /* Resultado mobile */
    .result-hero {
      text-align: center;
      padding-top: 4px;
      animation: fadeInUp 0.5s ease;
    }

    .trophy {
      font-size: 44px;
      margin: 4px 0 10px;
      animation: bounceIn 0.6s ease;
    }

    @keyframes bounceIn {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .result-title-main {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .result-title-main .orange {
      color: #fbbf24;
    }

    .result-title-main .black {
      color: white;
    }

    .result-sub {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 18px;
    }

    .result-total-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 18px;
      text-align: center;
      margin-bottom: 20px;
      animation: scaleIn 0.5s ease-out 0.1s both;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .result-total-label {
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.5px;
      font-size: 11px;
      margin-bottom: 8px;
    }

    .result-total-value {
      font-size: 42px;
      font-weight: 800;
      color: #fbbf24;
      line-height: 1;
      margin-bottom: 6px;
    }

    .detail-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 14px 16px;
      margin-bottom: 20px;
      animation: fadeInUp 0.5s ease-out 0.2s both;
    }

    .detail-title {
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.5px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      padding: 6px 0;
    }

    .detail-row .plus {
      color: #4ade80;
      font-weight: 700;
    }

    .detail-row.total {
      margin-top: 6px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 10px;
      font-weight: 800;
      color: white;
    }

    .detail-row.total span:last-child {
      color: #fbbf24;
    }

    .btn-large-orange {
      width: 100%;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      font-size: 15px;
      font-weight: 800;
      padding: 15px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      min-height: 54px;
    }

    .btn-large-orange:active {
      transform: scale(0.97);
    }

    .small-note {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 10px;
    }

    /* Withdraw mobile */
    .withdraw-title {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.2;
      margin-top: 8px;
      margin-bottom: 6px;
      color: white;
    }

    .withdraw-title .orange {
      color: #fbbf24;
    }

    .withdraw-sub {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      margin-bottom: 18px;
    }

    .amount-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .amount-box .label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
    }

    .amount-box .value {
      font-size: 20px;
      font-weight: 900;
      color: #fbbf24;
    }

    .section-label {
      color: rgba(255, 255, 255, 0.7);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.8px;
      margin: 0 0 10px;
    }

    .method-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .method {
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 12px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .method:active {
      transform: scale(0.97);
    }

    .method.selected {
      border-color: #fbbf24;
      background: rgba(251, 191, 36, 0.1);
    }

    .method-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .method-icon img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      border-radius: 8px;
    }

    .method-name {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 3px;
      color: #fbbf24;
    }

    .phone-input-wrapper {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      margin-bottom: 20px;
      transition: all 0.2s;
    }

    .phone-input-wrapper:focus-within {
      border-color: #fbbf24;
      box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2);
    }

    .prefix {
      padding: 0 14px;
      font-size: 15px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px 0 0 20px;
      height: 54px;
      display: flex;
      align-items: center;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .phone-box {
      flex: 1;
      height: 54px;
      border: none;
      background: transparent;
      padding: 0 14px;
      font-size: 16px;
      font-weight: 500;
      color: white;
      outline: none;
      font-family: monospace;
    }

    .phone-box::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .btn-pay {
      width: 100%;
      border: none;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.3);
      font-size: 15px;
      font-weight: 800;
      padding: 15px;
      margin-bottom: 12px;
      cursor: not-allowed;
      transition: all 0.2s;
      min-height: 54px;
    }

    .btn-pay.active {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      cursor: pointer;
    }

    .btn-pay.active:active {
      transform: scale(0.97);
    }

    .secure-note {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
    }

    /* Error mobile */
    .error-icon-box {
      width: 70px;
      height: 70px;
      margin: 8px auto 18px;
      background: rgba(239, 68, 68, 0.1);
      border: 2px solid rgba(239, 68, 68, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #ef4444;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .error-title {
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 8px;
      color: white;
    }

    .error-sub {
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      line-height: 1.4;
      margin-bottom: 18px;
    }

    .alert-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 18px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .alert-box .icon {
      font-size: 18px;
      line-height: 1;
    }

    .alert-title {
      color: #ef4444;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .alert-text {
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      line-height: 1.4;
    }

    .video-card {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 18px;
      text-align: center;
    }

    .video-card .small {
      color: #fbbf24;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .video-card .big {
      font-size: 16px;
      font-weight: 900;
      margin-bottom: 12px;
      color: white;
    }

    .video-features {
      display: flex;
      justify-content: center;
      gap: 16px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      line-height: 1.3;
    }

    .video-features span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .video-btn {
      width: 100%;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      font-size: 14px;
      font-weight: 800;
      padding: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 52px;
    }

    .video-btn:active {
      transform: scale(0.97);
    }

    .center {
      text-align: center;
    }

    /* Ajustes para telas muito pequenas */
    @media (max-width: 380px) {
      .phone {
        padding: 8px;
      }
      
      .screen {
        padding: 16px 14px 20px;
        border-radius: 24px;
      }

      .question-text { 
        font-size: 16px; 
      }
      
      .option { 
        font-size: 13px; 
        padding: 12px 14px;
        min-height: 52px;
      }
      
      .result-total-value { 
        font-size: 36px; 
      }
      
      .hero-title { 
        font-size: 22px; 
      }
      
      .withdraw-title { 
        font-size: 22px; 
      }
      
      .logo-img img { 
        height: 32px; 
      }
      
      .logo-img span { 
        font-size: 14px; 
      }
      
      .balance-pill {
        padding: 6px 10px;
        font-size: 11px;
      }
      
      .method-icon {
        width: 40px;
        height: 40px;
      }
      
      .method-icon img {
        width: 40px;
        height: 40px;
      }
      
      .method-name {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen" id="app"></div>
  </div>

  <script>
    // ========== CONFIGURAÇÃO ==========
    const BONUS_INICIAL = 2000;
    const TOTAL_OBJETIVO = 12473;
    
    // Audio para o popup
    const audioCoin = new Audio();
    audioCoin.src = "assets/money.mp3";
    audioCoin.volume = 0.6;
    
    function playCoinSound() {
      try {
        audioCoin.currentTime = 0;
        audioCoin.play().catch(e => console.log("Audio play failed:", e));
      } catch(e) { console.log("Audio error:", e); }
    }
    
    // Gera valores aleatórios que somam TOTAL_OBJETIVO - BONUS_INICIAL
    function gerarValoresAleatorios() {
      let valores = [];
      let resto = TOTAL_OBJETIVO - BONUS_INICIAL;
      for (let i = 0; i < 4; i++) {
        let max = Math.min(2800, resto - 1800);
        let min = 1950;
        let val = Math.floor(Math.random() * (max - min + 1) + min);
        valores.push(val);
        resto -= val;
      }
      valores.push(resto);
      return valores;
    }
    
    let valoresSorteados = gerarValoresAleatorios();
    
    // Ícones modernos para as opções (usando emojis)
    const optionIcons = [
      ["🌐", "📅", "📱", "❓"],
      ["📱", "💻", "🖥️", "📟"],
      ["🛍️", "📆", "🎊", "🚫"],
      ["📶", "📡", "📱", "🔌"],
      ["💳", "🏦", "💸", "🎁"]
    ];
    
    const perguntas = [
      {
        titulo: "PERGUNTA 1",
        texto: "Com que frequência utiliza serviços de internet por semana?",
        opcoes: ["Todos os dias, várias vezes", "3 a 5 vezes por semana", "1 a 2 vezes por semana", "Raramente ou nunca"]
      },
      {
        titulo: "PERGUNTA 2",
        texto: "Qual dispositivo principal usa para aceder à internet?",
        opcoes: ["Telefone", "Laptop", "PC", "Tablet"]
      },
      {
        titulo: "PERGUNTA 3",
        texto: "Com que frequência faz compras ou pagamentos online?",
        opcoes: ["Toda semana", "Uma vez por mês", "Só em ocasiões especiais", "Ainda não faço pagamentos online"]
      },
      {
        titulo: "PERGUNTA 4",
        texto: "Qual operadora de internet mais usa em Moçambique?",
        opcoes: ["Vodacom", "Movitel", "Tmcel", "Outro provedor"]
      },
      {
        titulo: "PERGUNTA 5",
        texto: "Como prefere receber recompensas e pagamentos digitais?",
        opcoes: ["M-Pesa", "e-Mola", "Transferência bancária", "Voucher"]
      }
    ];

    let etapa = "landing";
    let indice = 0;
    let respostas = [];
    let metodo = "M-Pesa";
    let telefone = "";

    function saldoAtual() {
      let saldo = BONUS_INICIAL;
      for (let i = 0; i < respostas.length; i++) {
        saldo += valoresSorteados[i];
      }
      return saldo;
    }
    
    function getValorAtual() {
      return valoresSorteados[indice];
    }
    
    function getTotalFinal() {
      let total = BONUS_INICIAL;
      for (let i = 0; i < valoresSorteados.length; i++) {
        total += valoresSorteados[i];
      }
      return total;
    }

    function formatSpace(n) {
      return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
    }

    function progressPercent() {
      return ((indice + 1) / perguntas.length) * 100;
    }

    function brandHTML() {
      return `
        <div class="logo-img">
          <img src="assets/logo.png" alt="Nova IA" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fas fa-brain\' style=\'font-size: 28px; color: white;\'></i><span>NOVA IA</span>'">
        </div>
      `;
    }

    function renderLanding() {
      return `
        <div class="top-logo center" style="margin-top:6px;">${brandHTML()}</div>

        <div class="intro-box" style="margin-top:14px;">
          <span>Valor em conhecimento:</span>
          <span class="intro-pill">${formatSpace(TOTAL_OBJETIVO)} MT</span>
        </div>

        <div class="hero-title center">PARABÉNS, VOCÊ FOI SELECIONADO!</div>

        <div class="lead-text">
          Você acaba de receber acesso à nova ferramenta da Vodafone para treinar a nova
          <strong>inteligência artificial moçambicana.</strong>
        </div>

        <div class="lead-text" style="margin-top: 12px;">
          <strong>Aproveite: Com apenas 5 análises,</strong> você começa a entender como grandes sistemas de IA funcionam na prática!
        </div>

        <div class="lead-text" style="margin-top: 14px;">
          <strong>Clique no botão abaixo e comece agora!</strong>
        </div>

        <button class="cta-big" id="startBtn">
          <i class="fas fa-arrow-right" style="margin-right: 8px;"></i> COMEÇAR AGORA
        </button>
      `;
    }

    function renderQuiz() {
      const p = perguntas[indice];
      const icons = optionIcons[indice];
      const options = p.opcoes.map((text, idx) => `
        <button class="option" data-answer="${text.replace(/"/g, '&quot;')}">
          <span class="option-icon">${icons[idx]}</span>
          <span>${text}</span>
        </button>
      `).join("");

      return `
        <div class="top-row">
          <div class="top-logo">${brandHTML()}</div>
          <div class="balance-pill"><i class="fas fa-coins" style="margin-right: 4px;"></i> ${formatSpace(saldoAtual())} MT</div>
        </div>

        <hr class="separator" />

        <div class="progress-line-wrap">
          <span> Pergunta ${indice + 1} de 5</span>
          <span class="progress-reward"> +${formatSpace(getValorAtual())} MT</span>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" style="width:${progressPercent()}%"></div>
        </div>

        <div class="question-card">
          <div class="question-tag"><i class="fas fa-tag"></i> ${p.titulo}</div>
          <div class="question-text">${p.texto}</div>
        </div>

        <div class="options">${options}</div>

        <div class="reward-note">
          <i class="fas fa-trophy"></i> Qualquer resposta ganha +${formatSpace(getValorAtual())} MT!
        </div>
      `;
    }

    function renderPopup(ganho, novoSaldo) {
      return `
        <div class="modal-overlay" id="popup">
          <div class="modal">
            <div class="modal-sub"><i class="fas fa-check-circle" style="color: #4ade80;"></i> Resposta correcta!</div>
            <div class="modal-value">+${formatSpace(ganho)} MT</div>
            <div class="modal-small">adicionados ao seu saldo</div>

            <div class="modal-balance">
              <div class="label">Saldo total</div>
              <div class="value">${formatSpace(novoSaldo)} MT</div>
            </div>

            <button class="btn-orange" id="continueBtn"><i class="fas fa-arrow-right"></i> Continuar</button>
          </div>
        </div>
      `;
    }

    function renderProcessing() {
      return `
        <div class="process-wrap">
          <div class="process-circle">
            <div class="inner"></div>
          </div>

          <div class="process-title">A processar...</div>
          <div class="process-sub">Por favor, aguarde um momento</div>

          <div class="status-list">
            <div class="status-item" id="status1">
              <div class="status-left"><i class="fas fa-search"></i><span>Verificando as suas respostas...</span></div>
              <div class="status-right"></div>
            </div>

            <div class="status-item" id="status2">
              <div class="status-left"><i class="fas fa-check-circle"></i><span>Respostas validadas com sucesso!</span></div>
              <div class="status-right"></div>
            </div>

            <div class="status-item" id="status3">
              <div class="status-left"><i class="fas fa-calculator"></i><span>Calculando o saldo acumulado...</span></div>
              <div class="status-right"></div>
            </div>

            <div class="status-item" id="status4">
              <div class="status-left"><i class="fas fa-gift"></i><span>Recompensa confirmada!</span></div>
              <div class="status-right"></div>
            </div>
          </div>
        </div>
      `;
    }

    function renderResultado() {
      const totalFinal = getTotalFinal();
      const detalhesHtml = valoresSorteados.map((val, idx) => `
        <div class="detail-row"><span>Pergunta ${idx+1}</span><span class="plus">+${formatSpace(val)} MT</span></div>
      `).join("");
      
      return `
        <div class="result-hero">

          <div class="result-title-main">
            <span class="black">Parabéns!</span>
            <span class="orange"> Você<br />ganhou!</span>
          </div>

          <div class="result-sub">Completou todas as perguntas com sucesso!</div>
        </div>

        <div class="result-total-box">
          <div class="result-total-label">SALDO DISPONÍVEL PARA LEVANTAMENTO</div>
          <div class="result-total-value">${formatSpace(totalFinal)} MT</div>
        </div>

        <div class="detail-card">
          <div class="detail-title"><i class="fas fa-chart-line"></i> DETALHES DO SALDO</div>

          <div class="detail-row"><span>Bónus inicial</span><span style="font-weight:700;">${formatSpace(BONUS_INICIAL)} MT</span></div>
          ${detalhesHtml}

          <div class="detail-row total"><span>Total</span><span>${formatSpace(totalFinal)} MT</span></div>
        </div>

        <button class="btn-large-orange" id="withdrawBtn">
          <i class="fas fa-money-bill-wave"></i> LEVANTAR AGORA
        </button>
        <div class="small-note">⏰ Oferta expira em breve · Levantamento disponível por 24h</div>
      `;
    }

    function updateWithdrawUI() {
      const payBtn = document.getElementById("payBtn");
      const phoneInput = document.getElementById("phoneInput");
      const totalFinal = getTotalFinal();
      const amountValueSpan = document.querySelector(".amount-box .value");
      const balancePill = document.querySelector(".balance-pill");
      
      if (payBtn) {
        const isPhoneValid = telefone.length === 9 && /^\d+$/.test(telefone);
        if (isPhoneValid) {
          payBtn.classList.add("active");
          payBtn.disabled = false;
        } else {
          payBtn.classList.remove("active");
          payBtn.disabled = true;
        }
      }
      
      if (phoneInput && phoneInput.value !== telefone) {
        phoneInput.value = telefone;
      }
      
      if (amountValueSpan) {
        amountValueSpan.textContent = formatSpace(totalFinal) + " MT";
      }
      
      if (balancePill) {
        balancePill.innerHTML = `<i class="fas fa-coins" style="margin-right: 4px;"></i> ${formatSpace(totalFinal)} MT`;
      }
    }

    function renderLevantamento() {
      const totalFinal = getTotalFinal();
      const isPhoneValid = telefone.length === 9 && /^\d+$/.test(telefone);
      
      return `

        <div class="withdraw-title">
          Levantar <span class="orange">dinheiro</span>
        </div>
        <div class="withdraw-sub">Escolha o método e insira o número</div>

        <div class="amount-box">
          <div class="label">Valor a levantar</div>
          <div class="value">${formatSpace(totalFinal)} MT</div>
        </div>

        <div class="section-label"><i class="fas fa-credit-card"></i> MÉTODO DE PAGAMENTO</div>

        <div class="method-grid">
          <div class="method ${metodo === "M-Pesa" ? "selected" : ""}" data-method="M-Pesa">
            <div class="method-icon">
              <img src="assets/mpesa.png" alt="M-Pesa" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fas fa-mobile-alt\' style=\'font-size: 32px; color: #fbbf24;\'></i>'">
            </div>
            <div class="method-name">M-Pesa</div>
          </div>

          <div class="method ${metodo === "e-Mola" ? "selected" : ""}" data-method="e-Mola">
            <div class="method-icon">
              <img src="assets/emola.png" alt="e-Mola" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fas fa-university\' style=\'font-size: 32px; color: #fbbf24;\'></i>'">
            </div>
            <div class="method-name">e-Mola</div>
          </div>
        </div>

        <div class="section-label"><i class="fas fa-phone-alt"></i> NÚMERO DE TELEMÓVEL</div>
        <div class="phone-input-wrapper">
          <div class="prefix">+258</div>
          <input type="tel" class="phone-box" id="phoneInput" value="${telefone}" placeholder="8X XXX XXXX" maxlength="9" pattern="\\d*" inputmode="numeric" />
        </div>

        <button class="btn-pay ${isPhoneValid ? 'active' : ''}" id="payBtn" ${!isPhoneValid ? 'disabled' : ''}>
          <i class="fas fa-lock"></i> PROCESSAR PAGAMENTO
        </button>
        <div class="secure-note">🔒 Pagamento seguro e encriptado</div>
      `;
    }

    function renderErro() {
      return `
        <div class="error-icon-box"><i class="fas fa-exclamation-triangle"></i></div>

        <div class="error-title">Erro no processamento</div>
        <div class="error-sub">
          Ocorreu um problema ao processar o seu saque. O seu saldo está seguro.
        </div>

        <div class="alert-box">
          <div class="icon"><i class="fas fa-shield-alt"></i></div>
          <div>
            <div class="alert-title">Erro de verificação</div>
            <div class="alert-text">
              A sua conta precisa ser verificada antes de receber pagamentos.
              Assista ao vídeo abaixo para desbloquear o saque.
            </div>
          </div>
        </div>

        <div class="video-card">
          <div class="small"><i class="fas fa-video"></i> PARA DESBLOQUEAR O SAQUE:</div>
          <div class="big">Assista ao vídeo de verificação</div>
          <div class="video-features">
            <span><i class="fas fa-clock"></i> 30 segundos</span>
            <span><i class="fas fa-unlock-alt"></i> Desbloqueio imediato</span>
          </div>
        </div>

        <a href="verifique" class="video-btn" id="videoBtn">
          <i class="fas fa-play"></i> ASSISTIR VÍDEO <i class="fas fa-arrow-right"></i>
        </a>
      `;
    }

    function iniciarProcessamento() {
      const status1 = document.getElementById("status1");
      const status2 = document.getElementById("status2");
      const status3 = document.getElementById("status3");
      const status4 = document.getElementById("status4");
      
      setTimeout(() => {
        if (status1) {
          status1.classList.add("active-green");
          const rightDiv = status1.querySelector(".status-right");
          if (rightDiv) rightDiv.innerHTML = "<i class='fas fa-check'></i>";
        }
      }, 400);
      
      setTimeout(() => {
        if (status2) {
          status2.classList.add("active-green");
          const rightDiv = status2.querySelector(".status-right");
          if (rightDiv) rightDiv.innerHTML = "<i class='fas fa-check'></i>";
        }
      }, 1200);
      
      setTimeout(() => {
        if (status3) {
          status3.classList.add("active-orange");
          const rightDiv = status3.querySelector(".status-right");
          if (rightDiv) rightDiv.innerHTML = "<i class='fas fa-sync-alt'></i>";
        }
      }, 2000);
      
      setTimeout(() => {
        if (status4) {
          status4.classList.add("active-green");
          const rightDiv = status4.querySelector(".status-right");
          if (rightDiv) rightDiv.innerHTML = "<i class='fas fa-check'></i>";
        }
      }, 2800);
      
      setTimeout(() => {
        etapa = "resultado";
        render();
      }, 3600);
    }

    let isRendering = false;

    function render() {
      if (isRendering) return;
      isRendering = true;
      
      const app = document.getElementById("app");

      if (etapa === "landing") {
        app.innerHTML = renderLanding();
        document.getElementById("startBtn").onclick = () => {
          etapa = "quiz";
          render();
        };
        isRendering = false;
        return;
      }

      if (etapa === "quiz") {
        app.innerHTML = renderQuiz();

        document.querySelectorAll(".option").forEach((btn) => {
          btn.addEventListener("click", () => {
            const ganho = getValorAtual();
            respostas.push(btn.dataset.answer);
            const novoSaldo = saldoAtual();
            
            playCoinSound();
            document.body.insertAdjacentHTML("beforeend", renderPopup(ganho, novoSaldo));

            document.getElementById("continueBtn").onclick = () => {
              document.getElementById("popup").remove();

              if (indice < perguntas.length - 1) {
                indice++;
                render();
              } else {
                etapa = "processing";
                render();
                iniciarProcessamento();
              }
            };
          });
        });

        isRendering = false;
        return;
      }

      if (etapa === "processing") {
        app.innerHTML = renderProcessing();
        isRendering = false;
        return;
      }

      if (etapa === "resultado") {
        app.innerHTML = renderResultado();
        document.getElementById("withdrawBtn").onclick = () => {
          etapa = "levantamento";
          render();
        };
        isRendering = false;
        return;
      }

      if (etapa === "levantamento") {
        app.innerHTML = renderLevantamento();

        document.querySelectorAll(".method").forEach((m) => {
          m.onclick = () => {
            metodo = m.dataset.method;
            document.querySelectorAll(".method").forEach(method => {
              method.classList.remove("selected");
            });
            m.classList.add("selected");
          };
        });

        const input = document.getElementById("phoneInput");
        if (input) {
          input.addEventListener("input", (e) => {
            let val = e.target.value.replace(/\D/g, "").slice(0, 9);
            telefone = val;
            updateWithdrawUI();
          });
        }

        const payBtn = document.getElementById("payBtn");
        if (payBtn) {
          payBtn.onclick = () => {
            if (telefone.length === 9 && /^\d+$/.test(telefone)) {
              etapa = "erro";
              render();
            }
          };
        }

        isRendering = false;
        return;
      }

      if (etapa === "erro") {
        app.innerHTML = renderErro();
        isRendering = false;
        return;
      }
      
      isRendering = false;
    }

    render();
  </script>
</body>
</html>
